<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bootstrap | Stats preview card</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Lexend+Deca&display=swap" rel="stylesheet">

<style>

body{
background:hsl(233,47%,7%);
font-family:'Inter',sans-serif;
}

.card-container{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.card{
background:hsl(244,38%,16%);
border-radius:12px;
overflow:hidden;
max-width:1100px;
}

.title span{
color:hsl(277,64%,61%);
}

.description{
color:hsla(0,0%,100%,0.75);
}

.stats p{
margin:0;
}

.stat-number{
font-weight:700;
font-size:24px;
}

.stat-text{
font-size:12px;
letter-spacing:1px;
color:hsla(0,0%,100%,0.6);
}

.image-overlay{
background:hsl(277,64%,61%);
}

.image-overlay img{
mix-blend-mode:multiply;
opacity:0.8;
}

</style>

</head>

<body>

<div class="container card-container">

<div class="row card g-0">

<div class="col-md-6 p-5 d-flex flex-column justify-content-center text-white">

<h1 class="title fw-bold">
Get <span>insights</span> that help your business grow.
</h1>

<p class="description mt-3">
Discover the benefits of data analytics and make better decisions regarding revenue, customer experience, and overall efficiency.
</p>

<div class="row stats mt-4 text-center text-md-start">

<div class="col">
<p class="stat-number">10k+</p>
<p class="stat-text">COMPANIES</p>
</div>

<div class="col">
<p class="stat-number">314</p>
<p class="stat-text">TEMPLATES</p>
</div>

<div class="col">
<p class="stat-number">12M+</p>
<p class="stat-text">QUERIES</p>
</div>

</div>

</div>

<div class="col-md-6 image-overlay">
<img src="./images/image-header-desktop.jpg" class="img-fluid h-100 w-100 object-fit-cover">
</div>

</div>

</div>

</body>
</html>
