<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tailwind | Stats preview card</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Lexend+Deca&display=swap" rel="stylesheet">

</head>

<body class="bg-[hsl(233,47%,7%)] flex items-center justify-center min-h-screen font-[Inter]">

<div class="max-w-5xl bg-[hsl(244,38%,16%)] rounded-xl overflow-hidden md:flex">

<div class="p-10 text-white md:w-1/2">

<h1 class="text-3xl font-bold">
Get <span class="text-[hsl(277,64%,61%)]">insights</span> that help your business grow.
</h1>

<p class="mt-4 text-[hsla(0,0%,100%,0.75)]">
Discover the benefits of data analytics and make better decisions regarding revenue, customer experience, and overall efficiency.
</p>

<div class="flex justify-between mt-8 text-center md:text-left">

<div>
<p class="text-xl font-bold">10k+</p>
<p class="text-xs tracking-widest text-[hsla(0,0%,100%,0.6)]">COMPANIES</p>
</div>

<div>
<p class="text-xl font-bold">314</p>
<p class="text-xs tracking-widest text-[hsla(0,0%,100%,0.6)]">TEMPLATES</p>
</div>

<div>
<p class="text-xl font-bold">12M+</p>
<p class="text-xs tracking-widest text-[hsla(0,0%,100%,0.6)]">QUERIES</p>
</div>

</div>

</div>

<div class="md:w-1/2 bg-[hsl(277,64%,61%)]">
<img src="./images/image-header-desktop.jpg" class="mix-blend-multiply opacity-80 w-full h-full object-cover">
</div>

</div>

</body>
</html>
